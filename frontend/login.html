<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Complaint Management</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="brand">Complaint Management System</div>
  <div><a href="register.html">Register</a></div>
</div>

<div class="container" style="max-width:420px;">
  <div class="card">
    <h2>Login</h2>
    <div id="errorMsg" class="error-msg hidden"></div>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" required>

      <label>Password</label>
      <input type="password" id="password" required>

      <button type="submit" style="width:100%;">Login</button>
    </form>
    <p class="text-muted mt-10">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessage('errorMsg');

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const data = await apiRequest('/auth/login', {
      method: 'POST',
      body: { email, password }
    });
    saveSession(data.token, data.user);

    if (data.user.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
    else if (data.user.role === 'AGENT') window.location.href = 'agent-dashboard.html';
    else window.location.href = 'user-dashboard.html';
  } catch (err) {
    showError('errorMsg', err.message);
  }
});
</script>
</body>
</html>
